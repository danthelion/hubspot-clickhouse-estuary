services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: ch-demo
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "9000:9000"   # native protocol (plaintext)
      - "8123:8123"   # HTTP interface (debug only — Estuary uses native)
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ./data:/var/lib/clickhouse
      - ./config.d:/etc/clickhouse-server/config.d
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ch-ngrok
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command: ["tcp", "clickhouse:9000", "--log=stdout"]
    ports:
      - "4040:4040"   # ngrok web inspector

  webapp:
    build: ../webapp
    container_name: ch-webapp
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      CH_HOST: clickhouse
      CH_PORT: "8123"
      CH_USER: ${CLICKHOUSE_USER}
      CH_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CH_DATABASE: ${CLICKHOUSE_DB}
    ports:
      - "8080:8080"
    volumes:
      # Bind-mount sources so editing index.html / app.py hot-reloads via uvicorn.
      - ../webapp/app.py:/app/app.py:ro
      - ../webapp/index.html:/app/index.html:ro
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8080", "--reload"]
